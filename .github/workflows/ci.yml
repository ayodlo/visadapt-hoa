name: CI

on:
  push:
    branches: [main]
    paths:
      - 'nextjs/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'nextjs/**'
      - '.github/workflows/ci.yml'

jobs:
  unit:
    name: Unit tests & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nextjs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: nextjs/package-lock.json

      # npm implementations disagree on optional wasm deps in the lockfile;
      # pin to the version that generates it locally so `npm ci` validates.
      - name: Pin npm to match lockfile
        run: npm install -g npm@11.6.1

      - name: Install dependencies
        run: npm ci

      # Confirmed via repeated reproduction (not caching, not npm ci vs.
      # install, not invocation style): as long as this repo's root
      # package.json declares npm workspaces, `npm ci`/`npm install` on Linux
      # silently drops @rolldown/binding-linux-x64-gnu -- a valid, correctly
      # os/cpu-gated optional dependency that IS present in the lockfile.
      # This is npm's own documented optional-dependency bug
      # (npm/cli#4828), triggered here by rolldown (Vite's bundler binding)
      # shipping 15 platform variants for npm's resolver to pick from inside
      # a workspace. Reads the required version dynamically rather than
      # hardcoding it, so this keeps working as rolldown's version changes.
      # See DEVLOG 2026-07-14 for the full reproduction.
      - name: Work around npm/cli#4828 (rolldown native binding)
        run: |
          ROLLDOWN_VERSION=$(node -p "require('./node_modules/rolldown/package.json').version")
          npm install "@rolldown/binding-linux-x64-gnu@$ROLLDOWN_VERSION" --no-save

      - name: Unit tests
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Type check
        # Note: not `npx tsc` — since the repo root became an npm workspace,
        # npx's local-bin resolution for this subdir breaks and falls through
        # to an unrelated registry package literally named "tsc".
        run: node_modules/.bin/tsc --noEmit
