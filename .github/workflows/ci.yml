name: CI

on:
  push:
    branches: [main]
    paths:
      - 'nextjs/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'nextjs/**'
      - '.github/workflows/ci.yml'

jobs:
  unit:
    name: Unit tests & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nextjs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # No `cache: npm` here: actions/setup-node's npm cache restore can
      # resurrect a stale ~/.npm from an earlier run and trip npm's known
      # optional-dependency bug (npm/cli#4828) -- `npm ci` silently skips
      # installing a valid platform-specific optional package (e.g.
      # @rolldown/binding-linux-x64-gnu), even though the lockfile entry is
      # correct. Confirmed happening on this exact workflow; a from-scratch
      # npm cache avoids it. See DEVLOG 2026-07-14.

      # npm implementations disagree on optional wasm deps in the lockfile;
      # pin to the version that generates it locally so `npm ci` validates.
      - name: Pin npm to match lockfile
        run: npm install -g npm@11.6.1

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Type check
        # Note: not `npx tsc` — since the repo root became an npm workspace,
        # npx's local-bin resolution for this subdir breaks and falls through
        # to an unrelated registry package literally named "tsc".
        run: node_modules/.bin/tsc --noEmit
