name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Unit tests & lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nextjs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: nextjs/package-lock.json

      # npm implementations disagree on optional wasm deps in the lockfile;
      # pin to the version that generates it locally so `npm ci` validates.
      - name: Pin npm to match lockfile
        run: npm install -g npm@11.6.1

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit
