name: E2E tests

on:
  push:
    branches: [main]
  workflow_dispatch:

# Requires these repository secrets to be configured:
#   DATABASE_URL, JWT_SECRET, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
#   AWS_REGION, AWS_S3_BUCKET
# Add them at: Settings → Secrets and variables → Actions
# If DATABASE_URL is not set this job is skipped automatically.

jobs:
  e2e:
    name: Playwright
    runs-on: ubuntu-latest
    if: ${{ vars.E2E_ENABLED == 'true' }}
    defaults:
      run:
        working-directory: nextjs

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_EXPIRES_IN: 7d
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: nextjs/package-lock.json

      # npm implementations disagree on optional wasm deps in the lockfile;
      # pin to the version that generates it locally so `npm ci` validates.
      - name: Pin npm to match lockfile
        run: npm install -g npm@11.6.1

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: nextjs/playwright-report/
          retention-days: 7
