version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: communityhq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-communityhq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-communityhq_secret}
      POSTGRES_DB: ${POSTGRES_DB:-communityhq_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-communityhq} -d ${POSTGRES_DB:-communityhq_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
